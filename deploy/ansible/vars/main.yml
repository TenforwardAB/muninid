---
# Non-secret configuration. Secrets live in vars/secrets.yml (gitignored).

# Rootless podman user that runs the muninid pod
munin_user: podman_munin
munin_home: "/home/{{ munin_user }}"
munin_subid_start: 200000
munin_subid_count: 65536

# Container images
muninid_image: "ghcr.io/tenforwardab/muninid:latest"
# NOTE: verify the Anubis policy schema below matches this image version.
anubis_image: "ghcr.io/techarohq/anubis:latest"

# Public host
public_ip: "212.147.245.131"
# Network interfaces / internal address. Only 80+443 are exposed on the external
# interface; everything else is internal-only.
external_iface: "eth0"
internal_iface: "eth1"
internal_ip: "172.31.0.12"

# Domains terminated by HAProxy
idp_domain: "idp.solutrix.io"
demo_domain: "demo.go53.eu"
letsencrypt_email: "andre@tenforward.se"

# muninid runtime
muninid_issuer: "https://{{ idp_domain }}"
muninid_port: 8080

# Self-service password reset (/forgot, /reset). Sends via the shared WildDuck
# no-reply user (same instance solutrix-api uses; user = no-reply@solutrix.io).
reset_token_ttl: "1h"
reset_sender_user_id: "6831d6b1ac19dd89efe88700"
reset_sender_address: "no-reply@solutrix.io"
reset_sender_name: "Solutrix"

# Anubis (mild bot-wall) — challenges /interaction, /forgot, /reset
anubis_port: 8923
anubis_difficulty: 3

# go53 demo (existing /root/install_demo.sh) — fronted by HAProxy, no Caddy
demo_script: "/root/install_demo.sh"
demo_webadmin_port: 3000

# HAProxy per-source-IP rate limits
rl_global_per_10s: 100        # hard cap across ALL paths (10s window)
rl_login_post_per_30s: 10     # max login/password POSTs per 30s (page loads don't count)

# certbot HTTP-01 challenge port that HAProxy proxies to (standalone)
acme_http01_port: 8888
